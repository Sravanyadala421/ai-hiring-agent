version: '3.8'

services:
  hiring-agent:
    build: .
    ports:
      - "8501:8501"
    environment:
      - LLM_PROVIDER=gemini
      - DEFAULT_MODEL=gemini-2.5-flash
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./cache:/app/cache
      - ./resume_evaluations.csv:/app/resume_evaluations.csv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3